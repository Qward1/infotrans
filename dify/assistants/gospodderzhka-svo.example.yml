          provider: langgenius/openai_api_compatible/openai_api_compatible
        prompt_template:
        - id: conf-sys
          role: system
          text: |
            Ты оцениваешь качество черновика официального ответа гражданину.
            На входе — вопрос гражданина и предложенный черновик ответа.
            Оцени, насколько черновик точен, полон и обоснован относительно вопроса.
            Верни строго JSON: confidence (0..1) и rationale (краткое обоснование на русском, 1 фраза).
            Низкий confidence — если ответ общий, уклончивый или не отвечает на вопрос.
        - id: conf-user
          role: user
          text: |
            Вопрос и черновик ответа:
            {{#sys.query#}}
        selected: false
        structured_output:
          schema:
            additionalProperties: false
            properties:
              confidence:
                description: Уверенность в точности черновика 0..1.
                maximum: 1
                minimum: 0
                type: number
              rationale:
                description: Краткое обоснование оценки.
                type: string
            required: [confidence, rationale]
            type: object
        structured_output_enabled: true
        title: LLM уверенность
        type: llm
        vision: {enabled: false}
      height: 90
      id: conf_llm
      position: {x: 540, y: -480}
