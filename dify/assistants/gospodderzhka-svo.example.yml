      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        code: |-
          import json

          def main(key, confidence):
              table = {
                  "positive": ("Позитивное", "\U0001F60A", "ok"),
                  "neutral": ("Нейтральное", "\U0001F610", "info"),
                  "anxious": ("Тревожное", "\U0001F61F", "warn"),
                  "aggressive": ("Напряжённое", "\U0001F620", "danger"),
              }
              k = str(key or "neutral").strip().lower()
              if k not in table:
                  k = "neutral"
              label, emoji, tone = table[k]
              try:
                  conf = float(confidence)
              except Exception:
                  conf = 0.0
              payload = {"key": k, "label": label, "emoji": emoji, "tone": tone, "confidence": conf}
              return {"json": json.dumps(payload, ensure_ascii=False)}
        code_language: python3
        desc: 'Детерминированно достраивает label/emoji/tone по key. Формат совпадает
          с insight.analyze_sentiment в микросервисе.'
        outputs:
          json: {children: null, type: string}
        selected: false
        title: Упаковка тональности (JSON)
        type: code
        variables:
        - value_selector: [senti_llm, structured_output, key]
          value_type: string
          variable: key
        - value_selector: [senti_llm, structured_output, confidence]
          value_type: string
