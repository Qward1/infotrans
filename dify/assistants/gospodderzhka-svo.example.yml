    - data:
        code: |-
          import json

          def main(body):
              data = body
              if isinstance(body, str):
                  try:
                      data = json.loads(body)
                  except Exception:
                      return {"excel_text": body, "truncated": False}
              if not isinstance(data, dict):
                  return {"excel_text": str(body), "truncated": False}
              return {
                  "excel_text": str(data.get("text", "")),
                  "truncated": bool(data.get("truncated", False)),
              }
