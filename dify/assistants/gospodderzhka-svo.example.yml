      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 244
    - data:
        code: |-
          import json

          def main(confidence, rationale):
              try:
                  conf = float(confidence)
              except Exception:
                  conf = 0.0
              conf = max(0.0, min(1.0, conf))
              if conf >= 0.75:
                  label = "высокая"
              elif conf >= 0.5:
                  label = "средняя"
              elif conf >= 0.3:
                  label = "ниже средней"
              else:
                  label = "низкая"
              payload = {"confidence": conf, "label": label, "rationale": str(rationale or "")}
              return {"json": json.dumps(payload, ensure_ascii=False)}
        code_language: python3
        desc: 'Нормализует confidence в 0..1 и добавляет текстовую метку. Формат совпадает
          с draft confidence в микросервисе.'
        outputs:
          json: {children: null, type: string}
        selected: false
        title: Упаковка уверенности (JSON)
        type: code
        variables:
        - value_selector: [conf_llm, structured_output, confidence]
          value_type: string
          variable: confidence
        - value_selector: [conf_llm, structured_output, rationale]
          value_type: string
